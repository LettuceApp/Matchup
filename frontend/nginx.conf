server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Never cache the HTML entry point — forces browser to fetch new chunk URLs
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
        try_files $uri /index.html;
    }

    # JS/CSS chunks have content-hash filenames — safe to cache forever
    location ~* \.(js|css)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # React SPA routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Favicon (avoid 403 spam)
    location = /favicon.ico {
        log_not_found off;
        access_log off;
    }

    # Optional: silence robots.txt
    location = /robots.txt {
        log_not_found off;
        access_log off;
    }
}
