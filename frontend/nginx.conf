server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # gzip compression for text-like assets. nginx ships with gzip_static off
    # by default; on-the-fly compression on a 200-300KB main bundle is cheap
    # (~5ms) and shrinks the wire payload ~70%. Skip very small responses
    # where the headers cost more than the savings.
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        application/javascript
        application/x-javascript
        application/json
        application/xml
        application/xml+rss
        image/svg+xml
        font/woff
        font/woff2;

    # Never cache the HTML entry point — forces browser to fetch new chunk URLs
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
        try_files $uri /index.html;
    }

    # JS/CSS chunks have content-hash filenames — safe to cache forever
    location ~* \.(js|css)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # Fonts and SVG also have hashed filenames from Create React App, so they
    # can ride the same year-long immutable cache as JS/CSS.
    location ~* \.(woff2?|svg|eot|ttf|otf)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # React SPA routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Favicon (avoid 403 spam)
    location = /favicon.ico {
        log_not_found off;
        access_log off;
    }

    # Optional: silence robots.txt
    location = /robots.txt {
        log_not_found off;
        access_log off;
    }
}
