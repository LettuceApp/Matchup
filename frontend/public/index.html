<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <!--
      Favicons are served as both PNG and ICO. Modern browsers prefer
      the typed PNG link (sharper at 32×32); legacy / Windows pinning
      contexts use favicon.ico. Both blobs are pre-rendered by
      api/cmd/render_default_og and ship from /public.
    -->
    <link rel="icon" type="image/png" sizes="32x32" href="%PUBLIC_URL%/favicon-32.png" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!--
      theme-color matches the app shell's dark-navy backdrop so iOS
      Safari + Android Chrome tint the status bar to the brand surface
      instead of the OS default white.
    -->
    <meta name="theme-color" content="#0f172a" />
    <meta
      name="description"
      content="Matchup — vote, bracket, decide. Create and share head-to-head matchups with friends."
    />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <!--
      manifest.json provides metadata used when your web app is installed on a
      user's mobile device or desktop. See https://developers.google.com/web/fundamentals/web-app-manifest/
    -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <!--
      Notice the use of %PUBLIC_URL% in the tags above.
      It will be replaced with the URL of the `public` folder during the build.
      Only files inside the `public` folder can be referenced from the HTML.

      Unlike "/favicon.ico" or "favicon.ico", "%PUBLIC_URL%/favicon.ico" will
      work correctly both with client-side routing and a non-root public URL.
      Learn how to configure a non-root public URL by running `npm run build`.
    -->
    <!--
      Fallback OG / Twitter metadata for non-share pages. Per-content
      previews (matchup / bracket) are served by the Go API at
      /m/{short_id} and /b/{short_id} with content-specific tags.

      og:image is the 1200×630 stardust-branded card rendered by
      api/cmd/render_default_og — sized for `summary_large_image`
      cards on X, iMessage, Slack, Discord, Facebook, LinkedIn.
      Replacing the React-default logo512.png here is the whole
      reason the SPA's home-page unfurl no longer shows the generic
      blue atom.
    -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Matchup" />
    <meta property="og:title" content="Matchup — vote, bracket, decide." />
    <meta property="og:description" content="Create and share head-to-head matchups with friends." />
    <meta property="og:image" content="%PUBLIC_URL%/og-default.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Matchup — vote, bracket, decide." />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Matchup — vote, bracket, decide." />
    <meta name="twitter:description" content="Create and share head-to-head matchups with friends." />
    <meta name="twitter:image" content="%PUBLIC_URL%/og-default.png" />

    <title>Matchup — vote, bracket, decide.</title>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <!--
      This HTML file is a template.
      If you open it directly in the browser, you will see an empty page.

      You can add webfonts, meta tags, or analytics to this file.
      The build step will place the bundled scripts into the <body> tag.

      To begin the development, run `npm start` or `yarn start`.
      To create a production bundle, use `npm run build` or `yarn build`.
    -->
  </body>
</html>
