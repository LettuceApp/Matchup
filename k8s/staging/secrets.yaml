# =============================================================
# Matchup Staging Secrets — TEMPLATE ONLY
# =============================================================
# Mirrors the prod secrets.yaml shape — populated the same way
# (kubectl create secret --from-literal) but for the
# matchup-staging namespace. Use DIFFERENT values from prod:
#   * DB_PASSWORD + POSTGRES_PASSWORD → fresh password for the
#     staging Postgres volume
#   * SENDGRID_API_KEY → staging-only API key so reset / verify
#     emails sent by test runs don't count against prod quota
#   * API_SECRET → fresh JWT signing secret (so a leaked staging
#     token can't authenticate against prod)
#   * S3_BUCKET → staging bucket (prod images stay clean)
#
# To create the actual secret:
#
#   kubectl create secret generic matchup-secrets -n matchup-staging \
#     --from-literal=DB_USER=<staging_db_user> \
#     --from-literal=DB_PASSWORD=<staging_db_password> \
#     --from-literal=API_SECRET=<staging_jwt_secret> \
#     --from-literal=AWS_ACCESS_KEY_ID_ENV=<aws_key> \
#     --from-literal=AWS_SECRET_ACCESS_KEY_ENV=<aws_secret> \
#     --from-literal=AWS_REGION_ENV=<aws_region> \
#     --from-literal=S3_BUCKET=matchup-staging \
#     --from-literal=SENDGRID_API_KEY=<staging_sendgrid_key> \
#     --from-literal=SENDGRID_FROM=<staging_sender_email> \
#     --from-literal=ADMIN_EMAIL=<admin_email> \
#     --from-literal=ADMIN_PASSWORD=<staging_admin_password> \
#     --from-literal=POSTGRES_USER=<same_as_DB_USER> \
#     --from-literal=POSTGRES_PASSWORD=<same_as_DB_PASSWORD> \
#     --from-literal=POSTGRES_DB=matchup \
#     --from-literal=REPLICATION_PASSWORD=<staging_replicator_pw> \
#     --from-literal=SENTRY_DSN=<staging_sentry_dsn>
#
# =============================================================
apiVersion: v1
kind: Secret
metadata:
  name: matchup-secrets
  namespace: matchup-staging
type: Opaque
data: {}
# Populated via kubectl create secret (see above)
