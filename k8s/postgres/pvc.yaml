apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: matchup
spec:
  accessModes:
    - ReadWriteOnce           # Single node can mount — fine for 1-replica Postgres
  storageClassName: managed-csi # Azure default; uses Azure Managed Disks
  resources:
    requests:
      storage: 5Gi            # Expandable later via kubectl edit pvc
