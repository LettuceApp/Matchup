apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: matchup
  labels:
    app: postgres
    role: primary
spec:
  replicas: 1                    # Postgres can't run multi-replica without clustering
  strategy:
    type: Recreate               # Don't run 2 Postgres pods at once (data corruption risk)
  selector:
    matchLabels:
      app: postgres
      role: primary
  template:
    metadata:
      labels:
        app: postgres
        role: primary
    spec:
      containers:
        - name: postgres
          image: postgres:14
          ports:
            - containerPort: 5432
          # Override the entrypoint command so postgres picks up our
          # ConfigMap-mounted postgresql.conf and pg_hba.conf. The official
          # image's docker-entrypoint.sh runs initdb on first boot before
          # exec'ing the command below, so init scripts in
          # /docker-entrypoint-initdb.d/ still fire.
          args:
            - "-c"
            - "config_file=/etc/postgresql/postgresql.conf"
            - "-c"
            - "hba_file=/etc/postgresql/pg_hba.conf"
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: matchup-secrets
                  key: DB_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: matchup-secrets
                  key: DB_PASSWORD
            - name: POSTGRES_DB
              value: "matchup"
            - name: REPLICATION_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: matchup-secrets
                  key: REPLICATION_PASSWORD
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
              subPath: pgdata         # Avoids "lost+found" issue on Azure disks
            - name: postgres-config
              mountPath: /etc/postgresql/postgresql.conf
              subPath: postgresql.conf
            - name: postgres-config
              mountPath: /etc/postgresql/pg_hba.conf
              subPath: pg_hba.conf
            - name: postgres-init
              mountPath: /docker-entrypoint-initdb.d/init-replication-user.sh
              subPath: init-replication-user.sh
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "$(POSTGRES_USER)", "-d", "matchup"]
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "$(POSTGRES_USER)", "-d", "matchup"]
            initialDelaySeconds: 30
            periodSeconds: 30
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: postgres-pvc
        - name: postgres-config
          configMap:
            name: postgres-config
            items:
              - key: postgresql.conf
                path: postgresql.conf
              - key: pg_hba.conf
                path: pg_hba.conf
        - name: postgres-init
          configMap:
            name: postgres-config
            defaultMode: 0755
            items:
              - key: init-replication-user.sh
                path: init-replication-user.sh
