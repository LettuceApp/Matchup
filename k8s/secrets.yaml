# =============================================================
# Matchup Secrets — TEMPLATE ONLY
# =============================================================
# DO NOT put real values here. This file is committed to git
# as a reference for what secrets are required.
#
# To create the actual secret, run:
#
#   kubectl create secret generic matchup-secrets -n matchup \
#     --from-literal=DB_USER=<your_db_user> \
#     --from-literal=DB_PASSWORD=<your_db_password> \
#     --from-literal=API_SECRET=<your_jwt_secret> \
#     --from-literal=AWS_ACCESS_KEY_ID_ENV=<aws_key> \
#     --from-literal=AWS_SECRET_ACCESS_KEY_ENV=<aws_secret> \
#     --from-literal=AWS_REGION_ENV=<aws_region> \
#     --from-literal=S3_BUCKET=<s3_bucket_name> \
#     --from-literal=SENDGRID_API_KEY=<sendgrid_key> \
#     --from-literal=SENDGRID_FROM=<sendgrid_email> \
#     --from-literal=ADMIN_EMAIL=<admin_email> \
#     --from-literal=ADMIN_PASSWORD=<admin_password> \
#     --from-literal=POSTGRES_USER=<same_as_DB_USER> \
#     --from-literal=POSTGRES_PASSWORD=<same_as_DB_PASSWORD> \
#     --from-literal=POSTGRES_DB=matchup \
#     --from-literal=REPLICATION_PASSWORD=<replicator_password> \
#     --from-literal=SENTRY_DSN=<sentry_api_dsn>
#
# =============================================================
apiVersion: v1
kind: Secret
metadata:
  name: matchup-secrets
  namespace: matchup
type: Opaque
data: {}
