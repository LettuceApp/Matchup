apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: matchup
  labels:
    app: prometheus
spec:
  # ClusterIP — Prometheus is an internal tool. Access it via
  # `kubectl port-forward svc/prometheus 9090:9090 -n matchup`
  # or by routing through Grafana.
  type: ClusterIP
  selector:
    app: prometheus
  ports:
    - name: web
      port: 9090
      targetPort: 9090
