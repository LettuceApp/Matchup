name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  # ──────────────────────────────────────────────────
  # Go lint
  # ──────────────────────────────────────────────────
  lint-api:
    name: Lint Go
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: api/go.mod
          cache-dependency-path: api/go.sum

      - name: go vet
        run: go vet ./...

      - name: golangci-lint
        # Non-blocking. The codebase has pre-existing lint debt that
        # isn't worth a 50-file rewrite right now; go vet (above) still
        # gates real correctness issues. Re-enable as a required check
        # once a focused lint-cleanup pass has landed.
        continue-on-error: true
        uses: golangci/golangci-lint-action@v6
        with:
          working-directory: api
          version: v2.1

  # ──────────────────────────────────────────────────
  # Go tests + coverage
  # ──────────────────────────────────────────────────
  test-api:
    name: Test Go
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: api/go.mod
          cache-dependency-path: api/go.sum

      - name: Run tests with coverage
        run: go test -race -coverprofile=coverage.out -covermode=atomic ./...

      - name: Print coverage summary
        run: go tool cover -func=coverage.out

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: go-coverage
          path: api/coverage.out
          retention-days: 14

  # ──────────────────────────────────────────────────
  # Frontend lint
  # ──────────────────────────────────────────────────
  lint-frontend:
    name: Lint Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npx eslint src/ --max-warnings 0

  # ──────────────────────────────────────────────────
  # Frontend tests
  # ──────────────────────────────────────────────────
  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test -- --watchAll=false --passWithNoTests --coverage

  # ──────────────────────────────────────────────────
  # Build check (ensures Go compiles after lint+test)
  # ──────────────────────────────────────────────────
  build-check:
    name: Build Check
    runs-on: ubuntu-latest
    needs: [lint-api, test-api]
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: api/go.mod
          cache-dependency-path: api/go.sum

      - name: Build
        run: go build ./...
