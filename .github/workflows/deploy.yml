name: Test & Deploy

on:
  push:
    branches: [main]

# Required for OIDC token (Azure federated credentials)
permissions:
  id-token: write
  contents: read

env:
  ACR_REGISTRY: matchupacr.azurecr.io
  API_IMAGE: matchupacr.azurecr.io/matchup-api
  FRONTEND_IMAGE: matchupacr.azurecr.io/matchup-frontend
  AKS_CLUSTER: matchup-cluster     # az aks list -o table → CLUSTER NAME
  AKS_RESOURCE_GROUP: matchup-rg   # az aks list -o table → RESOURCE GROUP
  K8S_NAMESPACE: matchup

jobs:
  # ──────────────────────────────────────────────────
  # Job 1: Go unit tests
  # ──────────────────────────────────────────────────
  test-api:
    name: Go unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: api/go.mod
          cache-dependency-path: api/go.sum

      - name: Run tests
        run: go test ./... -count=1

  # ──────────────────────────────────────────────────
  # Job 2: Frontend unit tests
  # ──────────────────────────────────────────────────
  test-frontend:
    name: Frontend unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test -- --watchAll=false --passWithNoTests

  # ──────────────────────────────────────────────────
  # Job 3: Build & push API image
  # Only runs if both test jobs pass
  # ──────────────────────────────────────────────────
  build-api:
    name: Build & push API image
    runs-on: ubuntu-latest
    needs: [test-api, test-frontend]
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to ACR
        run: az acr login --name matchupacr

      - name: Set image tag
        id: meta
        run: echo "tag=${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"

      - name: Build & push
        run: |
          docker build api/ \
            --platform linux/amd64 \
            -t ${{ env.API_IMAGE }}:${{ steps.meta.outputs.tag }} \
            -t ${{ env.API_IMAGE }}:latest
          docker push ${{ env.API_IMAGE }}:${{ steps.meta.outputs.tag }}
          docker push ${{ env.API_IMAGE }}:latest

  # ──────────────────────────────────────────────────
  # Job 4: Build & push frontend image
  # Only runs if both test jobs pass
  # ──────────────────────────────────────────────────
  build-frontend:
    name: Build & push frontend image
    runs-on: ubuntu-latest
    needs: [test-api, test-frontend]
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to ACR
        run: az acr login --name matchupacr

      - name: Set image tag
        id: meta
        run: echo "tag=${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"

      - name: Build & push
        run: |
          docker build \
            --platform linux/amd64 \
            -f frontend/Dockerfile . \
            -t ${{ env.FRONTEND_IMAGE }}:${{ steps.meta.outputs.tag }} \
            -t ${{ env.FRONTEND_IMAGE }}:latest
          docker push ${{ env.FRONTEND_IMAGE }}:${{ steps.meta.outputs.tag }}
          docker push ${{ env.FRONTEND_IMAGE }}:latest

  # ──────────────────────────────────────────────────
  # Job 5: Deploy to AKS
  # ──────────────────────────────────────────────────
  deploy:
    name: Deploy to AKS
    runs-on: ubuntu-latest
    needs: [build-api, build-frontend]
    steps:
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set kubectl context
        run: |
          az aks get-credentials \
            --resource-group ${{ env.AKS_RESOURCE_GROUP }} \
            --name ${{ env.AKS_CLUSTER }} \
            --overwrite-existing

      - name: Update API image
        run: |
          kubectl set image deployment/matchup-api \
            api=${{ env.API_IMAGE }}:${{ needs.build-api.outputs.image_tag }} \
            -n ${{ env.K8S_NAMESPACE }}

      - name: Update frontend image
        run: |
          kubectl set image deployment/matchup-frontend \
            frontend=${{ env.FRONTEND_IMAGE }}:${{ needs.build-frontend.outputs.image_tag }} \
            -n ${{ env.K8S_NAMESPACE }}

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/matchup-api -n ${{ env.K8S_NAMESPACE }} --timeout=5m
          kubectl rollout status deployment/matchup-frontend -n ${{ env.K8S_NAMESPACE }} --timeout=5m
