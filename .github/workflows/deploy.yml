name: Test & Deploy (AKS — manual)

on:
  # AKS deploy is manual-only. Re-enable `push: branches: [main]` once
  # the cluster is provisioned and these GitHub Actions secrets are
  # configured: AZURE_CLIENT_ID, AZURE_TENANT_ID, AZURE_SUBSCRIPTION_ID,
  # SENTRY_AUTH_TOKEN, SENTRY_ORG, SENTRY_API_PROJECT,
  # SENTRY_FRONTEND_PROJECT, REACT_APP_SENTRY_DSN,
  # REACT_APP_POSTHOG_KEY, REACT_APP_POSTHOG_HOST.
  # Until then prod deploys via Render's GitHub auto-deploy on push
  # to main; running this workflow without those secrets just paints
  # the CI badge red for no benefit.
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

# Required for OIDC token (Azure federated credentials)
permissions:
  id-token: write
  contents: read

env:
  ACR_REGISTRY: matchupacr.azurecr.io
  API_IMAGE: matchupacr.azurecr.io/matchup-api
  FRONTEND_IMAGE: matchupacr.azurecr.io/matchup-frontend
  AKS_CLUSTER: matchup-cluster     # az aks list -o table → CLUSTER NAME
  AKS_RESOURCE_GROUP: matchup-rg   # az aks list -o table → RESOURCE GROUP
  K8S_NAMESPACE: matchup

jobs:
  # ──────────────────────────────────────────────────
  # Job 1: Go unit tests
  # ──────────────────────────────────────────────────
  test-api:
    name: Go unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: api/go.mod
          cache-dependency-path: api/go.sum

      - name: Run tests
        run: go test ./... -count=1

  # ──────────────────────────────────────────────────
  # Job 2: Frontend unit tests
  # ──────────────────────────────────────────────────
  test-frontend:
    name: Frontend unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test -- --watchAll=false --passWithNoTests

  # ──────────────────────────────────────────────────
  # Job 3: Build & push API image
  # Only runs if both test jobs pass
  # ──────────────────────────────────────────────────
  build-api:
    name: Build & push API image
    runs-on: ubuntu-latest
    needs: [test-api, test-frontend]
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to ACR
        run: az acr login --name matchupacr

      - name: Set image tag
        id: meta
        run: echo "tag=${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"

      - name: Build & push
        run: |
          docker build api/ \
            --platform linux/amd64 \
            --build-arg SENTRY_RELEASE=${{ steps.meta.outputs.tag }} \
            -t ${{ env.API_IMAGE }}:${{ steps.meta.outputs.tag }} \
            -t ${{ env.API_IMAGE }}:latest
          docker push ${{ env.API_IMAGE }}:${{ steps.meta.outputs.tag }}
          docker push ${{ env.API_IMAGE }}:latest

      # Register the backend release in Sentry so the SENTRY_RELEASE
      # env var the pod reports at runtime actually resolves to a known
      # release record. No sourcemaps (Go is compiled; stacktraces are
      # source-referenced), so we just create + finalise.
      - name: Register Sentry release (API)
        if: ${{ secrets.SENTRY_AUTH_TOKEN != '' }}
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_API_PROJECT }}
        run: |
          npx --yes @sentry/cli@latest releases new "${{ steps.meta.outputs.tag }}"
          npx --yes @sentry/cli@latest releases set-commits "${{ steps.meta.outputs.tag }}" --auto || true
          npx --yes @sentry/cli@latest releases finalize "${{ steps.meta.outputs.tag }}"

  # ──────────────────────────────────────────────────
  # Job 4: Build & push frontend image
  # Only runs if both test jobs pass
  # ──────────────────────────────────────────────────
  build-frontend:
    name: Build & push frontend image
    runs-on: ubuntu-latest
    needs: [test-api, test-frontend]
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to ACR
        run: az acr login --name matchupacr

      - name: Set image tag
        id: meta
        run: echo "tag=${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"

      - name: Build & push
        run: |
          docker build \
            --platform linux/amd64 \
            -f frontend/Dockerfile . \
            --build-arg REACT_APP_SENTRY_DSN=${{ secrets.REACT_APP_SENTRY_DSN }} \
            --build-arg REACT_APP_SENTRY_ENVIRONMENT=production \
            --build-arg REACT_APP_SENTRY_RELEASE=${{ steps.meta.outputs.tag }} \
            --build-arg SENTRY_AUTH_TOKEN=${{ secrets.SENTRY_AUTH_TOKEN }} \
            --build-arg SENTRY_ORG=${{ secrets.SENTRY_ORG }} \
            --build-arg SENTRY_PROJECT=${{ secrets.SENTRY_FRONTEND_PROJECT }} \
            --build-arg REACT_APP_POSTHOG_KEY=${{ secrets.REACT_APP_POSTHOG_KEY }} \
            --build-arg REACT_APP_POSTHOG_HOST=${{ secrets.REACT_APP_POSTHOG_HOST }} \
            --build-arg REACT_APP_POSTHOG_ENVIRONMENT=production \
            -t ${{ env.FRONTEND_IMAGE }}:${{ steps.meta.outputs.tag }} \
            -t ${{ env.FRONTEND_IMAGE }}:latest
          docker push ${{ env.FRONTEND_IMAGE }}:${{ steps.meta.outputs.tag }}
          docker push ${{ env.FRONTEND_IMAGE }}:latest

      # Create a Sentry release record + finalise so events flowing in
      # during the rollout window get tagged with the correct release.
      # Runs only when the auth token secret is configured so forked
      # PR builds don't try to call sentry.io.
      - name: Register Sentry release (frontend)
        if: ${{ secrets.SENTRY_AUTH_TOKEN != '' }}
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_FRONTEND_PROJECT }}
        run: |
          npx --yes @sentry/cli@latest releases new "${{ steps.meta.outputs.tag }}"
          npx --yes @sentry/cli@latest releases set-commits "${{ steps.meta.outputs.tag }}" --auto || true
          npx --yes @sentry/cli@latest releases finalize "${{ steps.meta.outputs.tag }}"

  # ──────────────────────────────────────────────────
  # Job 5: Deploy to AKS
  # ──────────────────────────────────────────────────
  deploy:
    name: Deploy to AKS
    runs-on: ubuntu-latest
    needs: [build-api, build-frontend]
    steps:
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set kubectl context
        run: |
          az aks get-credentials \
            --resource-group ${{ env.AKS_RESOURCE_GROUP }} \
            --name ${{ env.AKS_CLUSTER }} \
            --overwrite-existing

      - name: Update API image
        run: |
          kubectl set image deployment/matchup-api \
            api=${{ env.API_IMAGE }}:${{ needs.build-api.outputs.image_tag }} \
            -n ${{ env.K8S_NAMESPACE }}

      - name: Update frontend image
        run: |
          kubectl set image deployment/matchup-frontend \
            frontend=${{ env.FRONTEND_IMAGE }}:${{ needs.build-frontend.outputs.image_tag }} \
            -n ${{ env.K8S_NAMESPACE }}

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/matchup-api -n ${{ env.K8S_NAMESPACE }} --timeout=5m
          kubectl rollout status deployment/matchup-frontend -n ${{ env.K8S_NAMESPACE }} --timeout=5m
