version: '3.9'

services:
  postgres:
    image: postgres:14
    container_name: postgres
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - matchup

  redis:
    image: redis:7-alpine
    container_name: redis
    command: ["redis-server", "--save", "20", "1", "--loglevel", "warning"]
    ports:
      - "6379:6379"
    networks:
      - matchup

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: matchup-api
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
    restart: on-failure
    ports:
      - "8888:8888"
    networks:
      - matchup

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: matchup_frontend
    env_file:
      - .env
    ports:
      - "3000:80"
    networks:
      - matchup
    volumes:
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro

  cron:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: matchup-cron
    env_file:
      - .env
    # Same image as the API, different entrypoint. Replaces the former
    # Dagster orchestration stack — see api/scheduler and api/cmd/cron.
    entrypoint: ["./cron"]
    depends_on:
      - postgres
      - redis
    networks:
      - matchup

volumes:
  postgres_data:

networks:
  matchup:
    driver: bridge
