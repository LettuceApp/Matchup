version: '3.9'

services:
  postgres:
    image: postgres:14
    container_name: postgres
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - matchup

  redis:
    image: redis:7-alpine
    container_name: redis
    command: ["redis-server", "--save", "20", "1", "--loglevel", "warning"]
    ports:
      - "6379:6379"
    networks:
      - matchup

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: matchup-api
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
    restart: on-failure
    ports:
      - "8888:8888"
    networks:
      - matchup

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: matchup_frontend
    env_file:
      - .env
    ports:
      - "3000:80"
    networks:
      - matchup
    volumes:
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro

  cron:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: matchup-cron
    env_file:
      - .env
    # Same image as the API, different entrypoint. Replaces the former
    # Dagster orchestration stack — see api/scheduler and api/cmd/cron.
    entrypoint: ["./cron"]
    depends_on:
      - postgres
      - redis
    networks:
      - matchup

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - matchup
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.2.0
    container_name: grafana
    environment:
      # Default creds are admin/admin for local dev only. Override with
      # GRAFANA_ADMIN_PASSWORD in .env for anything non-local.
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    networks:
      - matchup
    restart: unless-stopped

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:

networks:
  matchup:
    driver: bridge
