version: "2"

# Repo-level lint config. Trimmed to match what this codebase
# actually meets today; the disabled linters are flagging real
# pre-existing issues (unused helpers kept for re-enabling features,
# fire-and-forget w.Write calls, deprecated SDK options) that aren't
# worth a 50-file rewrite right now. Re-enable in a focused cleanup
# pass when someone is willing to own the churn.
linters:
  default: standard
  disable:
    - errcheck
    - unused
  settings:
    staticcheck:
      checks:
        - all
        - "-ST1000"   # package comment missing
        - "-ST1003"   # naming style (DbUser vs DBUser, forgotUrl vs forgotURL)
        - "-ST1005"   # error strings capitalization
        - "-ST1016"   # receiver name consistency
        - "-ST1020"   # exported-doc comment phrasing
        - "-SA1019"   # deprecated API usage — has its own upgrade path
        - "-S1016"    # struct-literal → type conversion suggestion
        - "-QF1011"   # could omit type from declaration
