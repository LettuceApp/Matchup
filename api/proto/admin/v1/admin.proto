syntax = "proto3";
package admin.v1;
option go_package = "Matchup/gen/admin/v1;adminv1";

import "common/v1/common.proto";
import "user/v1/user.proto";

service AdminService {
  rpc ListUsers(ListUsersRequest) returns (ListUsersResponse);
  rpc UpdateUserRole(UpdateUserRoleRequest) returns (UpdateUserRoleResponse);
  rpc DeleteUser(DeleteUserRequest) returns (DeleteUserResponse);
  rpc ListMatchups(ListMatchupsRequest) returns (ListMatchupsResponse);
  rpc DeleteMatchup(DeleteMatchupRequest) returns (DeleteMatchupResponse);
  rpc ListBrackets(ListBracketsRequest) returns (ListBracketsResponse);
  rpc DeleteBracket(DeleteBracketRequest) returns (DeleteBracketResponse);

  // Moderation queue. ListReports surfaces open (or resolved) user
  // reports with denormalised subject + reporter fields so the UI
  // doesn't have to make N secondary requests.
  rpc ListReports(ListReportsRequest) returns (ListReportsResponse);
  // ResolveReport closes a report row with one of the four canonical
  // resolutions + optional moderator notes. Writes to admin_actions
  // as a side effect so the audit trail is append-only.
  rpc ResolveReport(ResolveReportRequest) returns (ResolveReportResponse);
  // BanUser soft-deletes + stamps banned_at/ban_reason. Unban clears
  // both so the user can log back in.
  rpc BanUser(BanUserRequest) returns (BanUserResponse);
  rpc UnbanUser(UnbanUserRequest) returns (UnbanUserResponse);
}

// AdminMatchupData includes author info for admin views.
message AdminMatchupData {
  string id = 1;
  string title = 2;
  string content = 3;
  string author_id = 4;
  string author_username = 5;
  repeated common.v1.MatchupItemResponse items = 6;
  int64 likes_count = 7;
  string created_at = 8;
  string updated_at = 9;
}

// AdminBracketData includes author info for admin views.
message AdminBracketData {
  string id = 1;
  string title = 2;
  string author_id = 3;
  string author_username = 4;
  string status = 5;
  int32 current_round = 6;
  int64 likes_count = 7;
  string created_at = 8;
  string updated_at = 9;
}

// ---- Request messages ----

message ListUsersRequest {
  optional int32 page = 1;
  optional int32 limit = 2;
}

message UpdateUserRoleRequest {
  string id = 1;
  bool is_admin = 2;
}

message DeleteUserRequest {
  string id = 1;
}

message ListMatchupsRequest {
  optional int32 page = 1;
  optional int32 limit = 2;
}

message DeleteMatchupRequest {
  string id = 1;
}

message ListBracketsRequest {
  optional int32 page = 1;
  optional int32 limit = 2;
}

message DeleteBracketRequest {
  string id = 1;
}

// ---- Response messages ----

message ListUsersResponse {
  repeated user.v1.UserProfile users = 1;
  common.v1.Pagination pagination = 2;
}

message UpdateUserRoleResponse {
  user.v1.UserProfile user = 1;
}

message DeleteUserResponse {
  string message = 1;
}

message ListMatchupsResponse {
  repeated AdminMatchupData matchups = 1;
  common.v1.Pagination pagination = 2;
}

message DeleteMatchupResponse {
  string message = 1;
}

message ListBracketsResponse {
  repeated AdminBracketData brackets = 1;
  common.v1.Pagination pagination = 2;
}

message DeleteBracketResponse {
  string message = 1;
}

// ---- Moderation queue ----

// AdminReport — one row in the moderation queue with denormalised
// context so the client can render without N+1 secondary fetches.
message AdminReport {
  int64 id = 1;
  string subject_type = 2;   // "matchup" | "bracket" | "comment" | "bracket_comment" | "user"
  string subject_id = 3;     // public UUID or username for "user"
  string subject_preview = 4; // short excerpt for comments / titles
  string reason = 5;         // closed set — see server CHECK
  string reason_detail = 6;
  string status = 7;         // "open" | "resolved"
  string resolution = 8;     // "" | "dismiss" | "remove_content" | "warn_user" | "ban_user"
  string reporter_username = 9;
  int64 reporter_id = 10;
  string created_at = 11;
  string reviewed_at = 12;
  string reviewed_by_username = 13;
}

message ListReportsRequest {
  // "" (default = "open"), "open", or "resolved"
  optional string status = 1;
  optional string cursor = 2;
  optional int32 limit = 3;
}
message ListReportsResponse {
  repeated AdminReport reports = 1;
  optional string next_cursor = 2;
}

message ResolveReportRequest {
  int64 report_id = 1;
  // "dismiss" | "remove_content" | "warn_user" | "ban_user"
  string resolution = 2;
  // Optional moderator note persisted on admin_actions for audit.
  optional string notes = 3;
  // Required when resolution == "ban_user"; short reason surfaced
  // to the audit log + users.ban_reason.
  optional string ban_reason = 4;
}
message ResolveReportResponse {
  string message = 1;
}

message BanUserRequest {
  string id = 1;      // username or public id
  string reason = 2;  // required; mirrored into users.ban_reason
}
message BanUserResponse { string message = 1; }

message UnbanUserRequest {
  string id = 1;
}
message UnbanUserResponse { string message = 1; }
