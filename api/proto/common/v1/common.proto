syntax = "proto3";
package common.v1;
option go_package = "Matchup/gen/common/v1;commonv1";

// UserSummaryResponse is the minimal user shape embedded in matchup/bracket responses.
//
// avatar_path is the S3 key (NOT a full URL) for the author's profile
// picture, or empty when the author hasn't uploaded one. The frontend
// resolves the key against REACT_APP_S3_BASE + size variant (thumb /
// medium / full) — same convention as the rest of the app. Embedded
// here so a feed render doesn't need an N+1 GetUser RPC per card.
message UserSummaryResponse {
  string id = 1;
  string username = 2;
  string avatar_path = 3;
}

// MatchupItemResponse is an item inside a matchup.
message MatchupItemResponse {
  string id = 1;
  string item = 2;
  int32 votes = 3;
  // Full S3 URL for the item's thumbnail, or empty when the item has
  // no image. Resolved server-side via ProcessMatchupItemImagePath
  // (which lifts the relative DB path to a CDN-style URL). Empty
  // strings are valid; the frontend falls back to a text-only card.
  string image_url = 4;
  // user_id — populated when this item is a "user contender". The
  // frontend renders the user's avatar + @username in place of the
  // text label. Empty for plain text/image items. The user_username
  // + user_avatar_path siblings are hydrated server-side so the
  // feed render doesn't need an N+1 GetUser RPC per item.
  string user_id = 5;
  string user_username = 6;
  // Resolved full S3 URL (already lifted via appdb.ProcessAvatarPath).
  string user_avatar_path = 7;
}

// Pagination is included in paginated list responses.
message Pagination {
  int32 page = 1;
  int32 limit = 2;
  int64 total = 3;
  int32 total_pages = 4;
}
