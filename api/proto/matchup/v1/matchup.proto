syntax = "proto3";
package matchup.v1;
option go_package = "Matchup/gen/matchup/v1;matchupv1";

import "common/v1/common.proto";

service MatchupService {
  rpc ListMatchups(ListMatchupsRequest) returns (ListMatchupsResponse);
  rpc GetMatchup(GetMatchupRequest) returns (GetMatchupResponse);
  rpc GetPopularMatchups(GetPopularMatchupsRequest) returns (GetPopularMatchupsResponse);
  rpc GetUserMatchups(GetUserMatchupsRequest) returns (GetUserMatchupsResponse);
  rpc CreateMatchup(CreateMatchupRequest) returns (CreateMatchupResponse);
  rpc UpdateMatchup(UpdateMatchupRequest) returns (UpdateMatchupResponse);
  rpc DeleteMatchup(DeleteMatchupRequest) returns (DeleteMatchupResponse);
  rpc OverrideMatchupWinner(OverrideMatchupWinnerRequest) returns (OverrideMatchupWinnerResponse);
  rpc CompleteMatchup(CompleteMatchupRequest) returns (CompleteMatchupResponse);
  rpc ReadyUpMatchup(ReadyUpMatchupRequest) returns (ReadyUpMatchupResponse);
  rpc ActivateMatchup(ActivateMatchupRequest) returns (ActivateMatchupResponse);
}

service MatchupItemService {
  rpc AddItem(AddItemRequest) returns (AddItemResponse);
  rpc UpdateItem(UpdateItemRequest) returns (UpdateItemResponse);
  rpc DeleteItem(DeleteItemRequest) returns (DeleteItemResponse);
  rpc VoteItem(VoteItemRequest) returns (VoteItemResponse);
  rpc SkipMatchup(SkipMatchupRequest) returns (SkipMatchupResponse);
  rpc GetUserVotes(GetUserVotesRequest) returns (GetUserVotesResponse);

  // GetAnonVoteStatus reports how many of the per-browser free votes
  // an anonymous caller has already used vs the cap. Drives the
  // "X of 3 free votes left" counter chip on the matchup feed +
  // matchup detail page. Anon-only — authed users have unlimited
  // votes and don't need this RPC.
  rpc GetAnonVoteStatus(GetAnonVoteStatusRequest) returns (GetAnonVoteStatusResponse);
}

// MatchupData is the full matchup object returned from most matchup endpoints.
message MatchupData {
  string id = 1;
  string title = 2;
  string content = 3;
  string author_id = 4;
  common.v1.UserSummaryResponse author = 5;
  repeated common.v1.MatchupItemResponse items = 6;
  repeated CommentData comments = 7;
  int32 likes_count = 8;
  string created_at = 9;
  string updated_at = 10;
  optional string bracket_id = 11;
  optional int32 round = 12;
  optional int32 seed = 13;
  string status = 14;
  string end_mode = 15;
  int32 duration_seconds = 16;
  optional string start_time = 17;
  optional string end_time = 18;
  optional string winner_item_id = 19;
  optional string image_url = 20;
  repeated string tags = 21;
  // Short, shareable identifier (8-char base62) used in `/m/{short_id}`
  // preview URLs. Nullable for rows created before migration 014 until
  // the backfill binary finishes. Client code should fall back to `id`
  // when empty.
  string short_id = 22;
}

// CommentData is a comment embedded inside a matchup response.
message CommentData {
  string id = 1;
  string user_id = 2;
  string username = 3;
  string body = 4;
  string created_at = 5;
  string updated_at = 6;
}

// PopularMatchupData is a lightweight matchup used in the popular feed.
message PopularMatchupData {
  string id = 1;
  string title = 2;
  string author_id = 3;
  optional string bracket_id = 4;
  optional string bracket_author_id = 5;
  optional int32 round = 6;
  optional int32 current_round = 7;
  int32 votes = 8;
  int32 likes = 9;
  int32 comments = 10;
  double engagement_score = 11;
  int32 rank = 12;
  string author_username = 13;
  string created_at = 14;
}

// MatchupVoteData is a single vote record.
message MatchupVoteData {
  string id = 1;
  optional string user_id = 2;
  string matchup_id = 3;
  string matchup_item_id = 4;
  string created_at = 5;
}

// ---- Request messages ----

message ListMatchupsRequest {
  optional int32 page = 1;
  optional int32 limit = 2;
}

message GetMatchupRequest {
  string id = 1;
}

message GetPopularMatchupsRequest {}

message GetUserMatchupsRequest {
  string user_id = 1;
  optional int32 page = 2;
  optional int32 limit = 3;
}

message MatchupItemCreate {
  string item = 1;
}

message CreateMatchupRequest {
  string user_id = 1;
  string title = 2;
  optional string content = 3;
  repeated MatchupItemCreate items = 4;
  optional string end_mode = 5;
  optional int32 duration_seconds = 6;
  optional string bracket_id = 7;
  optional int32 round = 8;
  optional int32 seed = 9;
  repeated string tags = 10;
  // Field numbers 11+12 previously carried base64-in-proto cover
  // image bytes + content-type. Reserved now that uploads go via
  // UploadService.PresignUpload(kind="matchup_cover").
  reserved 11, 12;
  reserved "image_data", "image_content_type";
  // S3 object key returned by UploadService.PresignUpload. Optional
  // because not every matchup has a cover image.
  optional string upload_key = 13;
}

message UpdateMatchupRequest {
  string id = 1;
  optional string title = 2;
  optional string content = 3;
  repeated string tags = 4;
}

message DeleteMatchupRequest {
  string id = 1;
}

message OverrideMatchupWinnerRequest {
  string id = 1;
  string winner_item_id = 2;
}

message CompleteMatchupRequest {
  string id = 1;
}

message ReadyUpMatchupRequest {
  string id = 1;
}

message ActivateMatchupRequest {
  string id = 1;
}

message AddItemRequest {
  string matchup_id = 1;
  string item = 2;
}

message UpdateItemRequest {
  string id = 1;
  string item = 2;
}

message DeleteItemRequest {
  string id = 1;
}

message VoteItemRequest {
  string id = 1;
  optional string anon_id = 2;
}

// SkipMatchup records that the viewer chose not to pick either
// contender on a matchup. Skips are stored in matchup_votes alongside
// picks but with kind='skip' and a NULL matchup_item_public_id; they
// do NOT count toward the anon vote cap and do NOT increment any
// item's votes counter. If the viewer had previously picked an item
// on this matchup, switching to skip decrements that item's count
// the same way switching between items does.
message SkipMatchupRequest {
  // matchup_id is the matchup's public_id (UUID) — same identifier
  // GetMatchup uses. Anon callers pass an anon_id; authed callers can
  // omit it and the handler resolves identity from the bearer token.
  string matchup_id = 1;
  optional string anon_id = 2;
}

message GetUserVotesRequest {
  string user_id = 1;
}

// ---- Response messages ----

message ListMatchupsResponse {
  repeated MatchupData matchups = 1;
  common.v1.Pagination pagination = 2;
}

message GetMatchupResponse {
  MatchupData matchup = 1;
}

message GetPopularMatchupsResponse {
  repeated PopularMatchupData matchups = 1;
}

message GetUserMatchupsResponse {
  repeated MatchupData matchups = 1;
  common.v1.Pagination pagination = 2;
}

message CreateMatchupResponse {
  MatchupData matchup = 1;
}

message UpdateMatchupResponse {
  MatchupData matchup = 1;
}

message DeleteMatchupResponse {
  string message = 1;
}

message OverrideMatchupWinnerResponse {
  string message = 1;
  string winner_item_id = 2;
}

message CompleteMatchupResponse {
  string message = 1;
  string status = 2;
  string winner_item_id = 3;
}

message ReadyUpMatchupResponse {
  MatchupData matchup = 1;
}

message ActivateMatchupResponse {
  MatchupData matchup = 1;
}

message AddItemResponse {
  common.v1.MatchupItemResponse item = 1;
}

message UpdateItemResponse {
  common.v1.MatchupItemResponse item = 1;
}

message DeleteItemResponse {
  string message = 1;
}

message VoteItemResponse {
  common.v1.MatchupItemResponse item = 1;
  bool already_voted = 2;
}

message SkipMatchupResponse {
  // True when the viewer had already skipped this matchup before this
  // call. Lets the frontend distinguish "skip recorded" from "you'd
  // already skipped this one" without a separate state-fetch round-trip.
  bool already_skipped = 1;
}

message GetUserVotesResponse {
  repeated MatchupVoteData votes = 1;
}

// GetAnonVoteStatus — used by the frontend's anon vote counter.
// `anon_id` is the per-browser UUID stored in localStorage. Server
// counts rows in matchup_votes against that anon_id and returns the
// pair (used, max) so the UI can render "2 of 3 free votes left"
// without duplicating the cap value.
message GetAnonVoteStatusRequest {
  string anon_id = 1;
}
message GetAnonVoteStatusResponse {
  int32 used = 1;
  int32 max = 2;
}
